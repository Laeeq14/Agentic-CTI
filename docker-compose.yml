version: "3.9"

# ═══════════════════════════════════════════════════════════
#  Agentic-CTI Docker Compose Stack
#
#  Services:
#    qdrant  — Vector database (official image, persistent volume)
#    app     — Streamlit + LangGraph pipeline
#
#  Usage:
#    docker-compose up --build          # first run
#    docker-compose up -d               # detached mode
#    docker-compose down -v             # tear down + remove volumes
# ═══════════════════════════════════════════════════════════

services:

  # ── Qdrant Vector Database ───────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: agentic_cti_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Agentic-CTI Application ──────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic_cti_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Override local Qdrant path — connect to the Qdrant service instead
      QDRANT_URL: http://qdrant:6333
      # Sentence-transformers cache inside container
      TRANSFORMERS_CACHE: /app/.cache/transformers
      HF_HOME: /app/.cache/huggingface
    volumes:
      # Persist watch directories across container restarts
      - ./watch_inbox:/app/watch_inbox
      - ./watch_results:/app/watch_results
      # Mount model cache so it isn't re-downloaded on every restart
      - model_cache:/app/.cache
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  qdrant_data:
    driver: local
  model_cache:
    driver: local
